{% extends "base.html" %}
{% block title %}PRECARE - Riwayat{% endblock %}
{% block page_title %}Riwayat Pemeriksaan{% endblock %}

{% block content %}
<div class="history-container">
    <!-- Search & Filters -->
    <div class="history-toolbar">
        <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="search-history" class="search-input" placeholder="Cari nama pasien..." autocomplete="off">
        </div>
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all" id="filter-all" onclick="filterHistory('all')">Semua</button>
            <button class="filter-btn" data-filter="Rendah" id="filter-low" onclick="filterHistory('Rendah')">
                <span class="risk-dot low"></span> Rendah
            </button>
            <button class="filter-btn" data-filter="Sedang" id="filter-medium" onclick="filterHistory('Sedang')">
                <span class="risk-dot medium"></span> Sedang
            </button>
            <button class="filter-btn" data-filter="Tinggi" id="filter-high" onclick="filterHistory('Tinggi')">
                <span class="risk-dot high"></span> Tinggi
            </button>
        </div>
    </div>

    <!-- History Cards -->
    <div class="history-list" id="history-list">
        <div class="empty-state" id="history-empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="48" height="48" opacity="0.3">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
            </svg>
            <p>Belum ada riwayat pemeriksaan</p>
        </div>
    </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay hidden" id="detail-modal">
    <div class="modal-content" id="detail-modal-content">
        <div class="modal-header">
            <h3>Detail Pemeriksaan</h3>
            <button class="modal-close" id="modal-close" onclick="closeDetailModal()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <div class="modal-body" id="detail-modal-body">
            <!-- Filled dynamically -->
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" id="modal-delete" onclick="deleteScreening()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
                Hapus
            </button>
            <button class="btn btn-secondary" id="modal-print" onclick="printFromModal()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <polyline points="6 9 6 2 18 2 18 9"/>
                    <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
                    <rect x="6" y="14" width="12" height="8"/>
                </svg>
                Cetak
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/history.js"></script>
{% endblock %}
